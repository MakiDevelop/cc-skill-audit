name: Skill Audit

on:
  pull_request:
    paths:
      - 'skills/**'
      - '.claude/skills/**'
  workflow_dispatch:
    inputs:
      skill_path:
        description: 'Path to skill directory to audit'
        required: true
        default: '.'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cc-skill-audit
        run: |
          chmod +x bin/cc-skill-audit
          echo "${GITHUB_WORKSPACE}/bin" >> "${GITHUB_PATH}"

      - name: Detect skill directories
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          SKILL_PATH_INPUT: ${{ github.event.inputs.skill_path }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "paths=${SKILL_PATH_INPUT}" >> "${GITHUB_OUTPUT}"
          else
            DIRS=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
              | grep -E '^(skills/|\.claude/skills/)' \
              | xargs -I{} dirname {} \
              | sort -u \
              | head -10 \
              | tr '\n' ' ')
            echo "paths=${DIRS:-skills/}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run skill audit
        id: audit
        env:
          SKILL_DIRS: ${{ steps.detect.outputs.paths }}
        run: |
          EXIT=0
          for dir in ${SKILL_DIRS}; do
            if [ -d "${dir}" ]; then
              echo "## Scanning: ${dir}"
              cc-skill-audit "${dir}" || EXIT=$?
              echo ""
              safe_name=$(echo "${dir}" | tr '/' '_')
              cc-skill-audit "${dir}" --sarif > "${safe_name}.sarif" 2>/dev/null || true
            fi
          done
          echo "exit_code=${EXIT}" >> "${GITHUB_OUTPUT}"

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('@actions/glob');
            const globber = await glob.create('*.sarif');
            let body = '## Skill Audit Results\n\n';
            for await (const file of globber.globGenerator()) {
              const sarif = JSON.parse(fs.readFileSync(file, 'utf8'));
              const run = sarif.runs[0];
              const risk = run.invocations[0].properties.risk;
              const score = run.invocations[0].properties.score;
              const findings = run.results.length;
              const emoji = risk === 'GREEN' ? '\u2705' : risk === 'YELLOW' ? '\u26A0\uFE0F' : '\uD83D\uDEA8';
              body += `${emoji} **${risk}** (score: ${score}/100) \u2014 ${findings} finding(s)\n`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail on RED
        env:
          AUDIT_EXIT: ${{ steps.audit.outputs.exit_code }}
        run: |
          if [ "${AUDIT_EXIT}" = "2" ]; then
            echo "::error::Skill audit found RED-level issues. Review the findings above."
            exit 1
          fi
